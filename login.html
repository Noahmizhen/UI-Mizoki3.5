<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MIZ OKI 3.5 — Log In</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121a;
            --bg-tertiary: #1a1a24;
            --text-primary: #f0f0f5;
            --text-secondary: #9090a0;
            --text-muted: #606070;
            --accent-blue: #4f8fff;
            --accent-cyan: #00d4ff;
            --border: rgba(255,255,255,0.08);
            --glow-cyan: rgba(0, 212, 255, 0.2);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        nav {
            padding: 1.5rem 2rem;
            border-bottom: 1px solid var(--border);
            background: rgba(10, 10, 15, 0.85);
            backdrop-filter: blur(20px);
        }
        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo {
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text-primary);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .logo-version {
            font-size: 0.7rem;
            padding: 0.15rem 0.4rem;
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-blue));
            border-radius: 4px;
            color: var(--bg-primary);
            font-weight: 600;
        }
        .nav-links a {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.9rem;
            margin-left: 1.5rem;
        }
        .nav-links a:hover { color: var(--text-primary); }
        .page {
            flex: 1;
            display: grid;
            place-items: center;
            padding: 4rem 2rem;
        }
        .login-card {
            width: min(480px, 100%);
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 2.5rem;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
        }
        .login-card h1 {
            font-family: 'Instrument Serif', Georgia, serif;
            font-size: 2.2rem;
            font-weight: 400;
            margin-bottom: 0.5rem;
        }
        .login-card p {
            color: var(--text-secondary);
            margin-bottom: 2rem;
        }
        .form-field {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            margin-bottom: 1.25rem;
        }
        label { font-size: 0.85rem; color: var(--text-secondary); }
        input {
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 0.75rem 0.9rem;
            border-radius: 8px;
            font-size: 0.95rem;
        }
        input:focus {
            outline: none;
            border-color: var(--accent-cyan);
            box-shadow: 0 0 0 3px var(--glow-cyan);
        }
        .actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 1.5rem 0 2rem;
            font-size: 0.85rem;
        }
        .actions a { color: var(--accent-cyan); text-decoration: none; }
        .actions a:hover { text-decoration: underline; }
        .btn-primary {
            width: 100%;
            padding: 0.9rem 1.2rem;
            border-radius: 8px;
            border: none;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-blue));
            color: var(--bg-primary);
        }
        .btn-primary:hover { transform: translateY(-1px); }
        .login-footer {
            margin-top: 1.5rem;
            font-size: 0.85rem;
            color: var(--text-muted);
            text-align: center;
        }
        .login-footer a { color: var(--accent-cyan); text-decoration: none; }
    </style>
</head>
<body>
    <nav>
        <div class="nav-container">
            <a href="index.html" class="logo">MIZ OKI <span class="logo-version">3.5</span></a>
            <div class="nav-links">
                <a href="resources.html">Resources</a>
                <a href="case-studies.html">Case Studies</a>
                <a href="pricing.html">Pricing</a>
            </div>
        </div>
    </nav>

    <main class="page">
        <section class="login-card">
            <h1>Log in to MIZ OKI</h1>
            <p>Access your decision intelligence workspace and audit trails.</p>
            <form>
                <div class="form-field">
                    <label for="email">Work email</label>
                    <input id="email" name="email" type="email" autocomplete="email" placeholder="you@company.com" required>
                </div>
                <div class="form-field">
                    <label for="password">Password</label>
                    <input id="password" name="password" type="password" autocomplete="current-password" placeholder="••••••••" required>
                </div>
                <div class="actions">
                    <label><input type="checkbox" name="remember"> Remember me</label>
                    <a href="#">Forgot password?</a>
                </div>
                <button class="btn-primary" type="submit">Log in</button>
            </form>
            <div class="login-footer">
                Need an account? <a href="pricing.html">Request access</a>
            </div>
        </section>
    </main>
</body>
</html>
